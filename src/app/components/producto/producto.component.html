<article class="card">
  <img class="img" [src]="product.imagenUrl" [alt]="product.name" />

  <div class="body">
    <div class="top">
      <h3 class="title">{{ product.name }}</h3>
      <span class="price">
        {{ product.price | currency: 'MXN' : 'symbol' : '1.0-0' }}
      </span>
    </div>

    <p class="meta">{{ product.category }}</p>
    <p class="desc">{{ product.description }}</p>
    <p class="stock" [class.out]="!product.inStock">
      @if (product.inStock) { En stock }
      @else { Agotado }
    </p>

    <button class="btn"
      (click)="onAdd()"
      [disabled]="!product.inStock">
      Agregar al carrito
    </button>
  </div>
</article>
